<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CircleU — Gustavus Hangouts</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#05457B;--blue-mid:#7EC4F3;--blue-light:#E8F3FB;--blue-pale:#F0F7FD;
  --white:#FFFFFF;--g50:#F7F7F7;--g100:#EFEFEF;--g200:#E0E0E0;--g300:#C8C8C8;
  --g500:#888;--g700:#444;--text:#1A1A1A;--r:12px;
}
html,body{background:var(--white);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;color:var(--text);-webkit-font-smoothing:antialiased;min-height:100%}

/* Header & Progress */
#pw{position:fixed;top:0;left:0;right:0;z-index:100;height:4px;background:var(--g100)}
#pf{height:100%;background:var(--blue);width:0%;transition:width 0.6s cubic-bezier(0.25, 1, 0.5, 1)}
#bar{position:fixed;top:4px;left:0;right:0;z-index:99;display:flex;align-items:center;padding:14px 24px;background:rgba(255,255,255,.95);backdrop-filter:blur(10px);border-bottom:1px solid var(--g100);transition:transform 0.6s ease, opacity 0.6s ease;}
#bar.hidden{transform:translateY(-150%);opacity:0;pointer-events:none;}
.brand{font-size:16px;font-weight:600;color:var(--blue);letter-spacing:-.3px}
.ctag{margin-left:auto;font-size:10px;font-weight:700;color:var(--g500);background:var(--g50);border:1px solid var(--g100);padding:4px 12px;border-radius:20px;text-transform:uppercase;letter-spacing:0.5px}

/* Chat Container */
#chat-container{display:flex;flex-direction:column;max-width:600px;margin:0 auto;padding:80px 20px 120px;gap:24px;transition:padding-top 0.6s ease;}
.step-wrapper{opacity:0;transform:translateY(20px);transition:opacity 0.8s ease, transform 0.8s cubic-bezier(0.25, 1, 0.5, 1)}
.step-wrapper.active{opacity:1;transform:translateY(0)}
.step-wrapper.past-step{opacity:0.4;pointer-events:none}
.step-wrapper.past-step .qtxt{color:var(--g700)}

/* Bot Row & Avatar (Open Mascot) */
.bot-row{display:flex;align-items:flex-start;gap:14px}
.av{width:42px;height:42px;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;background:transparent;border:none;}
.bot-content{flex:1;min-width:0}
.qtxt{font-size:19px;font-weight:600;line-height:1.4;color:var(--text);letter-spacing:-.3px;margin-top:4px;margin-bottom:8px;transition:color 0.4s ease}

/* User Row & Bubble */
.user-row{display:flex;justify-content:flex-end;margin:8px 0 16px;opacity:0;transform:translateY(15px);transition:all 0.6s cubic-bezier(0.25, 1, 0.5, 1)}
.user-row.active{opacity:1;transform:translateY(0)}
.user-bubble{background:var(--blue);color:var(--white);padding:12px 18px;border-radius:18px 18px 4px 18px;font-size:16px;font-weight:500;max-width:85%;line-height:1.4;box-shadow:0 4px 12px rgba(5,69,123,0.15); word-break: break-word; overflow-wrap: break-word;}
.user-row.editable { cursor: pointer; transition: transform 0.2s ease, opacity 0.2s ease; }
.user-row.editable:hover { transform: scale(0.98); opacity: 0.85; }

/* Input Area animations */
.input-area{margin-top:16px;animation:fadeIn 0.6s ease 0.2s both}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* Form Elements */
.sec-label{font-size:12px;font-weight:700;color:var(--g500);text-transform:uppercase;letter-spacing:.08em;margin:16px 0 10px;margin-left:4px;}
.sec-label:first-child{margin-top:0}
.tf-opts{display:flex;flex-direction:column;gap:10px;margin-bottom:1rem;width:100%}
.tf-opt{display:flex;align-items:center;padding:12px 16px;border-radius:var(--r);border:2px solid var(--g200);background:var(--white);cursor:pointer;transition:all .2s ease;user-select:none;-webkit-tap-highlight-color:transparent; min-width:0;}
.tf-opt:hover{border-color:var(--blue-mid);background:var(--blue-pale)}
.tf-opt.sel{border-color:var(--blue);background:var(--blue-light)}
.badge{display:flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:6px;border:1px solid var(--g200);background:var(--g50);color:var(--g500);font-size:11px;font-weight:700;margin-right:12px;transition:all .2s; flex-shrink:0}
.tf-opt.sel .badge{background:var(--blue);border-color:var(--blue);color:var(--white)}
.badge svg { opacity: 0; transform: scale(0.5); width: 14px; height: 14px; transition: all 0.2s cubic-bezier(0.25, 1, 0.5, 1); }
.tf-opt.sel .badge svg { opacity: 1; transform: scale(1); }
.opt-txt{font-size:15.5px;color:var(--text);font-weight:500;line-height:1.4; flex:1; min-width:0; word-break: break-word; overflow-wrap: break-word;}
.tf-opt.sel .opt-txt{color:var(--blue)}

/* Compact List Options */
.tf-opts.list-compact { gap: 8px; }
.tf-opts.list-compact .tf-opt { padding: 10px 14px; }
.tf-opts.list-compact .badge { margin-right: 10px; width: 20px; height: 20px; }
.tf-opts.list-compact .badge svg { width: 12px; height: 12px; }
.tf-opts.list-compact .opt-txt { font-size: 14.5px; line-height: 1.35; }

/* Grid Options */
.tf-opts.grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
.tf-opts.grid .tf-opt { padding: 10px 12px; height: 100%; align-items: flex-start; }
.tf-opts.grid .badge { margin-top: 1px; margin-right: 8px; width: 18px; height: 18px; }
.tf-opts.grid .opt-txt { font-size: 13.5px; margin-top: 0; }

/* Text Inputs & Add Buttons */
.tf-add{display:flex;align-items:center;padding:10px 14px;border-radius:var(--r);border:2px dashed var(--g300);background:var(--white);transition:all .2s;margin-bottom:1.5rem}
.tf-add:focus-within{border-color:var(--blue);border-style:solid}
.tf-add-inp{flex:1;border:none;background:transparent;font-size:15px;color:var(--text);font-family:inherit;outline:none;min-width:0}
.tf-add-inp::placeholder{color:var(--g300)}
.tf-add-btn{background:var(--g100);border:none;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:600;color:var(--g700);cursor:pointer;transition:all .15s}
.tf-add-btn:hover{background:var(--blue);color:white}
.txt{width:100%;padding:12px 0;border:none;border-bottom:2px solid var(--g300);background:transparent;font-size:20px;font-weight:500;color:var(--text);font-family:inherit;outline:none;transition:border-color .2s;border-radius:0}
.txt:focus{border-color:var(--blue)}
.txt::placeholder{color:var(--g200);font-weight:400}
.hint{font-size:13px;color:var(--g500);margin-top:10px;line-height:1.5}

/* Autocomplete */
.ac-wrap{position:relative;width:100%}
.ac-list{display:none;flex-direction:column;width:100%;max-height:220px;overflow-y:auto;background:var(--white);border:1px solid var(--g200);border-radius:var(--r);box-shadow:0 8px 24px rgba(0,0,0,0.08);margin-top:8px;z-index:10;position:absolute;}
.ac-item{padding:14px 18px;font-size:15px;color:var(--text);cursor:pointer;border-bottom:1px solid var(--g50);transition:background .1s}
.ac-item:last-child{border-bottom:none}
.ac-item:hover{background:var(--blue-pale);color:var(--blue)}

/* CTA Button */
.cta{display:inline-flex;align-items:center;gap:10px;margin-top:1.5rem;padding:14px 28px;background:var(--blue);color:#fff;font-size:15px;font-weight:600;border:none;border-radius:var(--r);cursor:pointer;font-family:inherit;transition:all .4s cubic-bezier(0.25, 1, 0.5, 1);-webkit-tap-highlight-color:transparent}
.cta:hover:not(:disabled){background:#04386A;transform:translateY(-1px)}
.cta:active:not(:disabled){transform:scale(.98)}
.cta:disabled{opacity:0; pointer-events:none; transform:translateY(10px)}

/* Cards */
.info-card{background:var(--blue-pale);border:1px solid #C8DFF0;border-radius:var(--r);padding:14px 18px;margin-bottom:12px;font-size:14px;color:#04386A;line-height:1.5}
.warn-card{background:#FFF8F0;border:1px solid #FDDCB0;border-radius:var(--r);padding:14px 18px;margin-bottom:12px;font-size:14px;color:#7A4A00;line-height:1.5}

@media (max-width: 600px) {
  #chat-container{padding:70px 16px 120px; gap: 20px;}
  .qtxt{font-size:18px}
  .tf-opt{padding:12px 14px;}
  .cta{width:100%;justify-content:center;margin-top:1rem}
  
  /* Override to 1 column on mobile to prevent overflow on multiline options */
  .tf-opts.grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div id="pw"><div id="pf"></div></div>
<div id="bar">
  <span class="ctag">Gustavus Adolphus College</span>
</div>
<div id="chat-container"></div>
<div style="text-align: center; padding: 20px 20px 80px; opacity: 0.4;">
  <img src="https://raw.githubusercontent.com/TrivoConnect/circleU-forms/main/logo.png" style="height:48px; width:auto; object-fit:contain;" alt="CircleU Logo">
</div>

<script>
const ALPHA = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';

const GUSTAVUS_MAJORS = [
  'Accounting','Art & Art History','Biology','Business Management','Chemistry',
  'Communication Studies','Computer Science','Economics','Education','English',
  'Environmental Studies','Exercise Physiology','History','Mathematics','Music',
  'Nursing','Philosophy','Physics','Political Science','Psychological Science',
  'Sociology','Undecided / Exploring'
];

const steps=[
  {id:'email',
   q:"Hi Gustie, I am Sanu and I am organizing a few real hangouts for Gustavus students this week. No planning needed from you. What's your Gustavus email?",
   type:'text',ph:'your gustavus email',
   hint:"Used only to verify you go to Gustavus and to reach you if I find your group. Never shared.",
   ok:v=>v.toLowerCase().includes('.edu')},

  {id:'year',
   q:"What year are you?",
   type:'single',
   opts:['Freshman','Sophomore','Junior','Senior']},

  {id:'major',
   q:"What's your major?",
   type:'autocomplete',ph:'Type to search majors...',
   hint:"General area is fine. Helps match you with people at a similar point.",
   opts: GUSTAVUS_MAJORS,
   ok:v=>v.trim().length>2},

  {id:'vibe',
   q:"When you actually go out, what makes it feel worth it versus staying in?",
   info:"This helps me build a group with the right energy, not just the right interests.",
   type:'single',
   opts:[
     'Having a loose plan already',
     'Spontaneous energy in the group',
     'A familiar activity as the anchor',
     'Meeting just 1 or 2 new people'
   ]},

  {id:'comfort',
   q:"How comfortable are you going somewhere with people you have never met?",
   info:"Be honest. There is no wrong answer and it shapes how I match you.",
   type:'single',
   opts:[
     'Totally fine with it',
     'Fine if there is a clear activity',
     'I would prefer a warm intro first',
     'Not really my thing right now'
   ]},

  {id:'interests',
   q:"What are you into right now? Pick everything that fits.",
   type:'multi-custom',
   grid: true,
   opts:['Patio drinking','Breweries','Bars','Out in the sun','Football throw','Frisbee catch','Baseball throw','Pickup soccer','Hockey','Hammocking','Coffee runs','Running / jogging','Live music / shows','Board games']},

  {id:'hangouts',
   q:"Which of these would you actually go to this week?",
   info:"Real events and spots. Pick everything that sounds good.",
   type:'multi-grouped',
   groups:[
     {label:'On campus this week',opts:['Trivia night at The Dive','Dinner at the Caf','Walk in the Arb','Lund Center workout / climbing']},
     {label:'Spots near campus',opts:['River Rock Coffee run','Food at Patrick\'s on Third','Walk downtown St. Peter','Diamond Dust Bakery']}
   ]},

  {id:'avail',
   q:"When are you free? Pick everything that works.",
   type:'multi-custom',
   grid: true,
   opts:['Tuesday evening','Wednesday evening','Thursday evening','Friday night','Saturday afternoon','Saturday evening','Sunday afternoon'],
   cph:'Add a specific time...'},

  {id:'size',
   q:"How many people feels right for a hangout?",
   type:'single',
   opts:['2 to 3','4 to 6','7 or more','No preference']},

  {id:'bail',
   q:"What would most likely make you not show up even if we found your group?",
   info:"Helps me build groups that actually happen.",
   type:'single',
   opts:[
     'If I do not know anyone there',
     'If the spot feels off or too far',
     'If my plans change last minute',
     'Honestly I would show up no matter what'
   ]},

  {id:'extra',
   q:"Anything else you would like to share?",
   type:'text', ph:'Type here...',
   hint:"Optional. Any preferences, allergies, or anything else we should know.",
   ok: v => true}
];

const R={};let cur=0;let busy=false;
const chat=document.getElementById('chat-container');
const pf=document.getElementById('pf');

function av(){return `<div class="av"><img src="https://raw.githubusercontent.com/TrivoConnect/circleU-forms/main/mascot.svg" onerror="this.onerror=null;this.src='https://raw.githubusercontent.com/TrivoConnect/circleU-forms/main/mascot.png'" alt="Mascot" style="width:100%;height:100%;object-fit:contain;"></div>`}
function chev(){return`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>`}

function buildOpt(o, idx, isMulti) {
  return `
    <div class="tf-opt" data-v="${o}">
      <div class="badge">${isMulti ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>` : ALPHA[idx % 26]}</div>
      <div class="opt-txt">${o}</div>
    </div>
  `;
}

function scrollToStep(stepEl) {
  setTimeout(() => {
    if (stepEl) {
      const offset = window.innerWidth <= 600 ? 20 : 40;
      const y = stepEl.getBoundingClientRect().top + window.pageYOffset - offset;
      window.scrollTo({ top: y, behavior: 'smooth' });
    }
  }, 100);
}

function renderStep(i){
  const s=steps[i];
  const stepEl=document.createElement('div');
  stepEl.className='step-wrapper';
  stepEl.id=`step-${i}`;
  const isLast=i===steps.length-1;
  const editHint = '<p style="font-size: 13px; color: var(--g500); margin-bottom: 12px; font-weight: 500; margin-top: 1.5rem;">Need to change an answer? Scroll up and tap on your previous message to edit it.</p>';
  
  let infoHtml = s.info ? `<div class="info-card">${s.info}</div>` : '';
  let inputHtml='';

  if(s.type==='text'){
    inputHtml=`
    <input class="txt" id="ti" type="text" placeholder="${s.ph}" autocomplete="off" spellcheck="false">
    <div class="hint">${s.hint||''}</div>
    <div>${isLast ? editHint : ''}<button class="cta" id="cb" ${s.ok('') ? '' : 'disabled'}>${isLast ? 'Submit Response' : 'Continue'} ${chev()}</button></div>`;
  } else if (s.type === 'autocomplete') {
    inputHtml=`
    <div class="ac-wrap">
      <input class="txt" id="ti" type="text" placeholder="${s.ph}" autocomplete="off" spellcheck="false">
      <div class="ac-list" id="ac-list"></div>
    </div>
    <div class="hint">${s.hint||''}</div>
    <div><button class="cta" id="cb" disabled>Continue ${chev()}</button></div>`;
  } else if(s.type==='single'){
    const optsHtml=s.opts.map((o, idx)=>buildOpt(o, idx, false)).join('');
    inputHtml=`<div class="tf-opts">${optsHtml}</div>${isLast ? `${editHint}<button class="cta" id="cb" disabled>Submit Response ${chev()}</button>` : ''}`;
  } else if(s.type==='multi-grouped'){
    let g='';
    s.groups.forEach(gr=>{
      g+=`<div class="sec-label">${gr.label}</div><div class="tf-opts list-compact">${gr.opts.map((o, idx)=>buildOpt(o, idx, true)).join('')}</div>`;
    });
    inputHtml=`${g}${isLast ? editHint : ''}<button class="cta" id="cb" disabled>${isLast?'Submit Response':'Continue'} ${chev()}</button>`;
  } else if(s.type==='multi-custom'){
    const optsHtml=s.opts.map((o, idx)=>buildOpt(o, idx, true)).join('');
    inputHtml=`
    <div class="tf-opts grid" id="custom-opts-wrap-${i}">${optsHtml}</div>
    <div class="tf-add">
      <input class="tf-add-inp" id="ai" placeholder="${s.cph||'Add another option...'}" autocomplete="off">
      <button class="tf-add-btn" id="ab">Add</button>
    </div>
    ${isLast ? editHint : ''}
    <button class="cta" id="cb" disabled>${isLast?'Submit Response':'Continue'} ${chev()}</button>`;
  }

  stepEl.innerHTML=`
    <div class="bot-row">
      ${av()}
      <div class="bot-content">
        <div class="qtxt">${s.q}</div>
        ${infoHtml}
        <div class="input-area" id="input-area-${i}">
          ${inputHtml}
        </div>
      </div>
    </div>`;
  
  chat.appendChild(stepEl);
  wire(stepEl,i);
  
  requestAnimationFrame(() => {
    // Add a tiny delay so the transition feels staggered and smooth
    setTimeout(() => {
      stepEl.classList.add('active');
      scrollToStep(stepEl);
      if(window.innerWidth > 600) {
        const t=stepEl.querySelector('.txt') || stepEl.querySelector('.tf-add-inp');
        if(t) t.focus();
      }
    }, 50);
  });
}

function editStep(index) {
  if (busy) return;
  busy = true;
  document.querySelectorAll('.final-screen').forEach(el => el.remove());
  if (index === 0) {
    document.getElementById('bar').classList.remove('hidden');
    document.getElementById('chat-container').style.paddingTop = window.innerWidth <= 600 ? '70px' : '80px';
  }
  const stepEl = document.getElementById(`step-${index}`);
  if (stepEl) {
    stepEl.classList.remove('past-step');
    const inputArea = stepEl.querySelector('.input-area');
    if (inputArea) {
      inputArea.style.display = 'block';
      inputArea.style.height = '';
      inputArea.style.marginTop = '';
      inputArea.style.pointerEvents = 'auto';
      inputArea.style.transition = 'opacity 0.4s ease';
      inputArea.style.animation = ''; // Re-enable if needed
      
      requestAnimationFrame(() => {
        inputArea.style.opacity = '1';
      });
    }
  }
  for (let k = index + 1; k <= cur; k++) {
    const s = document.getElementById(`step-${k}`); if (s) s.remove();
    const u = document.getElementById(`user-row-${k}`); if (u) u.remove();
  }
  const userRow = document.getElementById(`user-row-${index}`);
  if (userRow) userRow.remove();
  cur = index;
  pf.style.width = Math.round((cur / steps.length) * 100) + '%';
  scrollToStep(stepEl);
  busy = false;
}

function submitAnswer(i, displayVal, rawVal) {
  if(busy) return;
  busy = true;
  R[steps[i].id] = rawVal;
  
  if(i === 0) {
    document.getElementById('bar').classList.add('hidden');
    document.getElementById('chat-container').style.paddingTop = '24px';
  }
  
  const stepEl = document.getElementById(`step-${i}`);
  stepEl.classList.add('past-step');
  
  const inputArea = stepEl.querySelector('.input-area');
  if(inputArea) {
    // Smoothly fade out instead of collapsing height instantly
    inputArea.style.transition = 'opacity 0.4s ease';
    inputArea.style.opacity = '0';
    inputArea.style.pointerEvents = 'none';
  }
  
  // Wait for the fade-out to finish, then append the user response and the next step
  setTimeout(() => { 
    if(inputArea) {
        inputArea.style.display = 'none'; 
    }
    
    const oldUserRow = document.getElementById(`user-row-${i}`);
    if (oldUserRow) oldUserRow.remove();
    
    const userRow = document.createElement('div');
    userRow.className = 'user-row editable';
    userRow.id = `user-row-${i}`;
    userRow.onclick = () => editStep(i);
    userRow.innerHTML = `<div class="user-bubble" title="Tap to edit">
      ${displayVal || '(Empty)'}
      <svg style="display:inline-block; vertical-align:-2px; margin-left:6px; width:14px; height:14px; opacity:0.7" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
    </div>`;
    
    stepEl.insertAdjacentElement('afterend', userRow);
    
    // Slide in the user answer
    requestAnimationFrame(() => {
      userRow.classList.add('active');
    });
    
    // Brief stagger before calculating the next step
    setTimeout(() => {
      if(steps[i].id === 'comfort' && rawVal === 'Not really my thing right now'){
        if (i < cur) {
          for (let k = i + 1; k <= cur; k++) {
            const s = document.getElementById(`step-${k}`); if (s) s.remove();
            const u = document.getElementById(`user-row-${k}`); if (u) u.remove();
          }
          cur = i;
          pf.style.width = Math.round((cur / steps.length) * 100) + '%';
        }
        setTimeout(() => { showNotReady(); busy = false; }, 100);
        return;
      }
      if (i < cur) {
        setTimeout(() => { if (cur >= steps.length && !document.querySelector('.final-screen')) { done(); } busy = false; }, 100);
        return;
      }
      cur++;
      pf.style.width = Math.round((cur / steps.length) * 100) + '%';
      if(cur >= steps.length) { done(); } else { renderStep(cur); }
      busy = false;
    }, 150); 
  }, 400); 
}

function wire(el,i){
  const s=steps[i];
  const isLast = i === steps.length - 1;
  if(s.type==='text'){
    const inp=el.querySelector('#ti'),btn=el.querySelector('#cb');
    inp.oninput=()=>{btn.disabled=!s.ok(inp.value)};
    inp.onkeydown=e=>{if(e.key==='Enter'&&!btn.disabled)btn.click()};
    btn.onclick=()=>submitAnswer(i, inp.value.trim(), inp.value.trim());
  } else if (s.type === 'autocomplete') {
    const inp=el.querySelector('#ti'), btn=el.querySelector('#cb'), list=el.querySelector('#ac-list');
    const renderList = (val) => {
      list.innerHTML = '';
      if(!val) { list.style.display = 'none'; return; }
      const matches = s.opts.filter(o => o.toLowerCase().includes(val.toLowerCase()));
      if(matches.length === 0) { list.style.display = 'none'; return; }
      list.style.display = 'flex';
      matches.forEach(m => {
        const item = document.createElement('div');
        item.className = 'ac-item';
        item.textContent = m;
        item.onclick = () => { inp.value = m; list.style.display = 'none'; btn.disabled = false; btn.click(); };
        list.appendChild(item);
      });
    };
    inp.oninput=()=>{ btn.disabled=!s.ok(inp.value); renderList(inp.value.trim()); };
    inp.onkeydown=e=>{if(e.key==='Enter'&&!btn.disabled)btn.click()};
    btn.onclick=()=>submitAnswer(i, inp.value.trim(), inp.value.trim());
    document.addEventListener('click', (e) => { if(!el.querySelector('.ac-wrap').contains(e.target)) list.style.display = 'none'; });
  } else if(s.type==='single'){
    const btn = el.querySelector('#cb');
    el.querySelectorAll('.tf-opt').forEach(p=>{
      p.onclick=()=>{
        if(busy) return;
        el.querySelectorAll('.tf-opt').forEach(opt=>opt.classList.remove('sel'));
        p.classList.add('sel');
        if(isLast && btn) { btn.disabled = false; el.dataset.selected = p.dataset.v; }
        else { setTimeout(() => submitAnswer(i, p.dataset.v, p.dataset.v), 200); }
      }
    });
    if(isLast && btn) { btn.onclick = () => { const val = el.dataset.selected; submitAnswer(i, val, val); }; }
  } else if(s.type==='multi-grouped'||s.type==='multi'||s.type==='multi-custom'){
    const sel=new Set(),btn=el.querySelector('#cb');
    el.querySelectorAll('.tf-opt').forEach(p=>{
      p.onclick=()=>{
        sel.has(p.dataset.v)?(sel.delete(p.dataset.v),p.classList.remove('sel')):(sel.add(p.dataset.v),p.classList.add('sel'));
        btn.disabled=sel.size===0;
      }
    });
    if(s.type==='multi-custom'){
      const pw=el.querySelector(`#custom-opts-wrap-${i}`), ai=el.querySelector('#ai'), ab=el.querySelector('#ab');
      function addC(){
        const v=ai.value.trim();if(!v||sel.has(v))return;
        sel.add(v);ai.value='';
        const p = document.createElement('div');
        p.className = 'tf-opt sel';
        p.dataset.v = v;
        p.innerHTML = `<div class="badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg></div><div class="opt-txt">${v}</div>`;
        p.onclick=()=>{ sel.has(v)?(sel.delete(v),p.classList.remove('sel')):(sel.add(v),p.classList.add('sel')); btn.disabled=sel.size===0; };
        pw.appendChild(p);btn.disabled=false;
      }
      ab.onclick=addC;
      ai.onkeydown=e=>{if(e.key==='Enter'){e.preventDefault();addC()}};
    }
    btn.onclick=()=>submitAnswer(i, [...sel].join(', '), [...sel]);
  }
}

function showNotReady(){
  pf.style.width='100%';
  const el=document.createElement('div');
  el.className='step-wrapper active final-screen';
  el.innerHTML=`
    <div class="bot-row">
      ${av()}
      <div class="bot-content">
        <div class="qtxt">That's totally fair.</div>
        <div class="warn-card">Hangouts with strangers aren't for everyone right now. CircleU works better when you're genuinely ready for it. I won't match you this round but I'm keeping your email and will reach out when there's a softer way in.</div>
        <div class="hint" style="margin-top:4px">No spam, no pressure. You'll only hear from us when something fits.</div>
        <div style="text-align: left; margin-top: 24px;">
          <p style="font-size: 13px; color: var(--g500); margin-bottom: 12px; font-weight: 500;">Need to change an answer? Scroll up and tap on your previous message to edit it.</p>
          <button class="cta" onclick="location.reload()" style="margin-top: 0; padding: 12px 24px; font-size: 14px; background: var(--white); color: var(--text); border: 2px solid var(--g200);">Start Over</button>
        </div>
      </div>
    </div>`;
  chat.appendChild(el);
  scrollToStep(el);
}

function done(){
  pf.style.width='100%';
  const el=document.createElement('div');
  el.className='step-wrapper active final-screen';
  el.innerHTML=`
    <div class="bot-row">
      ${av()}
      <div class="bot-content">
        <div class="qtxt" style="font-size:24px; margin-bottom:12px;">You're in.</div>
        <div class="info-card">
          I'll review responses over the next 24 to 48 hours. If I find a group that fits, I'll email you before sharing anything about you with anyone.
          <br><br>
          If the match isn't right this week, I'll let you know that too. Either way you'll hear back. No ghosts.
        </div>
        <div style="text-align: left; margin-top: 24px;">
          <p style="font-size: 13px; color: var(--g500); margin-bottom: 12px; font-weight: 500;">Need to change an answer? Scroll up and tap on your previous message to edit it.</p>
          <button class="cta" onclick="location.reload()" style="margin-top: 0; padding: 12px 24px; font-size: 14px; background: var(--white); color: var(--text); border: 2px solid var(--g200);">Submit Another Entry</button>
        </div>
      </div>
    </div>`;
  chat.appendChild(el);
  scrollToStep(el);
}

pf.style.width='0%';
renderStep(0);
</script>
