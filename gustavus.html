<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CircleU — Gustie Hangouts</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #fafaf8;
    --surface: #f2f1ee;
    --surface2: #e8e7e3;
    --border: rgba(0,0,0,0.1);
    --border2: rgba(0,0,0,0.18);
    --text: #1a1a18;
    --text2: #5a5a56;
    --text3: #9a9a94;
    --accent-bg: #e8f0fe;
    --accent-text: #1a56c4;
    --accent-border: #b8d0fa;
    --pill-sel-bg: #1a56c4;
    --pill-sel-text: #fff;
    --radius: 12px;
    --radius-sm: 8px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #141412;
      --surface: #1e1e1b;
      --surface2: #2a2a26;
      --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.18);
      --text: #f0efe8;
      --text2: #9a9a90;
      --text3: #5a5a54;
      --accent-bg: #1a2a4a;
      --accent-text: #7aabf7;
      --accent-border: #2a4a7a;
      --pill-sel-bg: #3a6fd4;
      --pill-sel-text: #fff;
    }
  }

  html, body {
    height: 100%;
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 0 4rem;
  }

  header {
    width: 100%;
    max-width: 520px;
    padding: 2rem 1.25rem 1rem;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--accent-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 600;
    color: var(--accent-text);
    flex-shrink: 0;
    border: 1px solid var(--accent-border);
  }

  .logo-text {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.3px;
  }

  .school-tag {
    margin-left: auto;
    font-size: 11px;
    color: var(--text3);
    background: var(--surface);
    padding: 3px 9px;
    border-radius: 20px;
    border: 1px solid var(--border);
  }

  #progress-bar {
    width: 100%;
    max-width: 520px;
    padding: 0 1.25rem;
    margin-bottom: 1.5rem;
  }

  .progress-track {
    height: 2px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent-text);
    border-radius: 2px;
    width: 0%;
    transition: width 0.4s ease;
  }

  #chat {
    width: 100%;
    max-width: 520px;
    padding: 0 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .bubble-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    margin-bottom: 0.75rem;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.35s ease, transform 0.35s ease;
  }

  .bubble-row.show { opacity: 1; transform: translateY(0); }

  .avatar {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: var(--accent-bg);
    border: 1px solid var(--accent-border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 600;
    color: var(--accent-text);
    flex-shrink: 0;
  }

  .bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px 16px 16px 4px;
    padding: 11px 15px;
    font-size: 14.5px;
    line-height: 1.6;
    color: var(--text);
    max-width: 88%;
  }

  .answer-area {
    margin: 0.25rem 0 1.25rem 38px;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.3s ease 0.2s, transform 0.3s ease 0.2s;
  }

  .answer-area.show { opacity: 1; transform: translateY(0); }

  .pills {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
  }

  .pill {
    padding: 8px 14px;
    border-radius: 20px;
    border: 1px solid var(--border2);
    background: var(--bg);
    font-size: 13.5px;
    color: var(--text);
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .pill:hover { background: var(--surface); }

  .pill.selected {
    background: var(--pill-sel-bg);
    border-color: transparent;
    color: var(--pill-sel-text);
    font-weight: 500;
  }

  .text-input {
    width: 100%;
    padding: 11px 14px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border2);
    background: var(--bg);
    font-size: 14px;
    color: var(--text);
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }

  .text-input:focus { border-color: var(--accent-text); }
  .text-input::placeholder { color: var(--text3); }

  .hint {
    font-size: 12px;
    color: var(--text3);
    margin-top: 5px;
  }

  .next-btn {
    margin-top: 10px;
    padding: 9px 20px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border2);
    background: var(--bg);
    font-size: 13.5px;
    color: var(--text);
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s;
  }

  .next-btn:hover { background: var(--surface); }

  .next-btn:disabled {
    opacity: 0.3;
    cursor: default;
  }

  .user-reply {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 0.75rem;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.3s ease, transform 0.3s ease;
  }

  .user-reply.show { opacity: 1; transform: translateY(0); }

  .user-bubble {
    background: var(--accent-bg);
    border: 1px solid var(--accent-border);
    border-radius: 16px 16px 4px 16px;
    padding: 10px 15px;
    font-size: 13.5px;
    color: var(--accent-text);
    max-width: 82%;
    line-height: 1.55;
  }

  .done-card {
    margin: 1.5rem 0 0 38px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }

  .done-card.show { opacity: 1; transform: translateY(0); }

  .done-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
  }

  .done-body {
    font-size: 13.5px;
    color: var(--text2);
    line-height: 1.65;
  }
</style>
</head>
<body>

<header>
  <div class="logo">C</div>
  <span class="logo-text">CircleU</span>
  <span class="school-tag">Gustavus Adolphus</span>
</header>

<div id="progress-bar">
  <div class="progress-track">
    <div class="progress-fill" id="fill"></div>
  </div>
</div>

<div id="chat"></div>

<script>
const steps = [
  {
    id: 'email',
    msg: "Hey Gustie. We're putting together a few small hangouts this week — no planning needed on your end. Can I grab your Gustavus email first?",
    type: 'text',
    placeholder: 'yourname@gustavus.edu',
    hint: 'Only used to reach you. Never shared.',
    validate: v => v.includes('@') && (v.includes('gustavus') || v.includes('.edu'))
  },
  {
    id: 'year',
    msg: "Nice. What year are you?",
    type: 'single',
    options: ['First year', 'Sophomore', 'Junior', 'Senior']
  },
  {
    id: 'major',
    msg: "What's your major or area of study? General area is fine.",
    type: 'text',
    placeholder: 'e.g. Biology, Music, Undecided...',
    hint: 'Helps us find people at a similar point in school.',
    validate: v => v.trim().length > 1
  },
  {
    id: 'hangouts',
    msg: "Which of these would you actually go to this week? Pick as many as you want.",
    type: 'multi',
    options: [
      'Coffee at River Rock',
      'Wings at Wing King',
      'Breakfast at Nicollet Cafe',
      'Drinks at Paddlefish Brewery',
      'Walk or hang in the Arb',
      'Food Co-op grab + chill',
      'Dinner at El Agave'
    ]
  },
  {
    id: 'availability',
    msg: "When are you free? Pick everything that works.",
    type: 'multi',
    options: ['Tuesday evening', 'Wednesday evening', 'Thursday evening', 'Friday night', 'Saturday', 'Sunday afternoon']
  },
  {
    id: 'groupsize',
    msg: "Last one — how many people feels right for a hangout?",
    type: 'single',
    options: ['2 to 3', '4 to 6', '7 or more', 'No preference']
  }
];

const responses = {};
let current = 0;
const chat = document.getElementById('chat');
const fill = document.getElementById('fill');

function updateProgress() {
  fill.style.width = ((current / steps.length) * 100) + '%';
}

function show(el, delay = 0) {
  setTimeout(() => el.classList.add('show'), delay);
}

function scrollDown() {
  setTimeout(() => window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }), 100);
}

function addBubble(text, delay = 0) {
  const row = document.createElement('div');
  row.className = 'bubble-row';
  row.innerHTML = `<div class="avatar">S</div><div class="bubble">${text}</div>`;
  chat.appendChild(row);
  show(row, delay);
  return row;
}

function addUserReply(text) {
  const r = document.createElement('div');
  r.className = 'user-reply';
  r.innerHTML = `<div class="user-bubble">${text}</div>`;
  chat.appendChild(r);
  show(r, 50);
  scrollDown();
}

function renderStep(index) {
  updateProgress();
  const step = steps[index];
  const delay = index === 0 ? 200 : 0;
  addBubble(step.msg, delay);

  const area = document.createElement('div');
  area.className = 'answer-area';

  if (step.type === 'text') {
    const inp = document.createElement('input');
    inp.type = 'text';
    inp.className = 'text-input';
    inp.placeholder = step.placeholder;
    const hint = document.createElement('div');
    hint.className = 'hint';
    hint.textContent = step.hint || '';
    const btn = document.createElement('button');
    btn.className = 'next-btn';
    btn.textContent = 'Continue';
    btn.disabled = true;
    inp.addEventListener('input', () => { btn.disabled = !step.validate(inp.value); });
    inp.addEventListener('keydown', e => { if (e.key === 'Enter' && !btn.disabled) btn.click(); });
    btn.addEventListener('click', () => {
      const val = inp.value.trim();
      responses[step.id] = val;
      area.style.pointerEvents = 'none';
      area.style.opacity = '0.35';
      addUserReply(val);
      setTimeout(() => next(), 450);
    });
    area.appendChild(inp);
    if (step.hint) area.appendChild(hint);
    area.appendChild(btn);
    chat.appendChild(area);
    show(area, delay + 250);
    setTimeout(() => inp.focus(), delay + 350);

  } else if (step.type === 'single') {
    const pills = document.createElement('div');
    pills.className = 'pills';
    step.options.forEach(opt => {
      const p = document.createElement('div');
      p.className = 'pill';
      p.textContent = opt;
      p.addEventListener('click', () => {
        responses[step.id] = opt;
        area.style.pointerEvents = 'none';
        area.style.opacity = '0.35';
        addUserReply(opt);
        setTimeout(() => next(), 450);
      });
      pills.appendChild(p);
    });
    area.appendChild(pills);
    chat.appendChild(area);
    show(area, delay + 250);

  } else if (step.type === 'multi') {
    const pills = document.createElement('div');
    pills.className = 'pills';
    const selected = new Set();
    step.options.forEach(opt => {
      const p = document.createElement('div');
      p.className = 'pill';
      p.textContent = opt;
      p.addEventListener('click', () => {
        if (selected.has(opt)) { selected.delete(opt); p.classList.remove('selected'); }
        else { selected.add(opt); p.classList.add('selected'); }
        btn.disabled = selected.size === 0;
      });
      pills.appendChild(p);
    });
    const btn = document.createElement('button');
    btn.className = 'next-btn';
    btn.textContent = index === steps.length - 1 ? "That's it, send it" : 'Looks good';
    btn.disabled = true;
    btn.addEventListener('click', () => {
      const vals = [...selected];
      responses[step.id] = vals;
      area.style.pointerEvents = 'none';
      area.style.opacity = '0.35';
      addUserReply(vals.join(', '));
      setTimeout(() => next(), 450);
    });
    area.appendChild(pills);
    area.appendChild(btn);
    chat.appendChild(area);
    show(area, delay + 250);
  }

  scrollDown();
}

function next() {
  current++;
  if (current < steps.length) {
    renderStep(current);
  } else {
    finish();
  }
}

function finish() {
  fill.style.width = '100%';
  const done = document.createElement('div');
  done.className = 'done-card';
  done.innerHTML = `
    <div class="done-title">You're in.</div>
    <div class="done-body">I'll review responses over the next 48 hours. If I find a group that fits, I'll email you before sharing anything about you with anyone. If there's no match this week, I'll let you know that too. Either way, you'll hear back.</div>
  `;
  chat.appendChild(done);
  show(done, 300);
  scrollDown();
  console.log('CircleU Gustavus responses:', responses);
}

renderStep(0);
</script>
</body>
</html>
